<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Secure Drive Controller</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-cyan: #06b6d4;
            --accent-success: #10b981;
            --accent-danger: #f43f5e;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.15) 0, transparent 50%);
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px);
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--glass-shadow);
        }

        .audit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            text-align: left;
        }

        .audit-table th {
            color: var(--text-secondary);
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .audit-table td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .badge-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-failure {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-danger);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .no-records {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Audit Trail History</h1>
        <a href="/" class="btn-back">&larr; Back to Dashboard</a>
    </div>

    <div class="card">
        <div style="overflow-x:auto;">
            <table class="audit-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User / Source</th>
                        <th>Action Performed</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .}}
                    <tr>
                        <td style="font-family: monospace; color: var(--text-secondary);">{{.Timestamp}}</td>
                        <td><strong>{{.User}}</strong></td>
                        <td style="font-family: monospace; font-size: 0.9rem;">{{.Action}}</td>
                        <td>
                            <span class="badge-status {{if eq .Status `SUCCESS`}}status-success{{else}}status-failure{{end}}">
                                {{.Status}}
                            </span>
                        </td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="4" class="no-records">No audit logs found.</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
